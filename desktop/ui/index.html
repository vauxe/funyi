<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Funyi Live Captions</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main id="app-shell" class="app-shell" data-overlay-mode="compact">
      <section id="caption-strip" class="caption-strip drag-surface" aria-label="Live caption window">
        <section class="history-panel" aria-label="Subtitle history">
          <section id="history-list" class="history-list" aria-label="Stable subtitle history"></section>
        </section>

        <section class="caption-window" aria-label="Current subtitles">
          <div class="caption-line previous">
            <div id="previous-source" class="caption-source"></div>
            <div id="previous-translation" class="caption-translation"></div>
          </div>
          <div class="caption-line current">
            <div id="current-source" class="caption-source"></div>
            <div id="current-translation" class="caption-translation"></div>
          </div>
        </section>

        <div class="caption-controls" aria-label="Session controls">
          <button
            id="session-button"
            class="icon-button session-control"
            type="button"
            aria-label="Start"
            title="Start"
          ></button>
          <button
            id="history-button"
            class="icon-button history-control"
            type="button"
            aria-label="Show history"
            title="Show history"
            aria-expanded="false"
          ></button>
          <button
            id="close-button"
            class="icon-button close-control"
            type="button"
            aria-label="Close"
            title="Close"
          ></button>
        </div>

        <section class="status-line" aria-live="polite">
          <label class="status-field status-field-service">
            <span>服务</span>
            <input id="server-url" value="ws://127.0.0.1:8000/ws/asr" spellcheck="false" />
          </label>
          <label class="status-field">
            <span>语言</span>
            <input id="language" value="Chinese" spellcheck="false" />
          </label>
          <label class="status-field status-field-source">
            <span>音源</span>
            <select id="audio-source"></select>
          </label>
          <label class="status-toggle">
            <input id="translation-enabled" type="checkbox" checked />
            <span>译</span>
          </label>
          <span id="connection-status"></span>
          <span id="ready-status"></span>
          <span id="capture-status"></span>
          <span id="audio-stats"></span>
        </section>
      </section>
    </main>

    <script type="module" src="./dist/app.js"></script>
  </body>
</html>
