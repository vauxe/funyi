<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Funyi Live Captions</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main id="app-shell" class="app-shell" data-overlay-mode="compact" data-chrome="visible">
      <section id="caption-strip" class="caption-strip drag-surface" aria-label="Live caption window">
        <section class="history-panel" aria-label="Subtitle history">
          <section id="history-list" class="history-list" aria-label="Stable subtitle history"></section>
        </section>

        <section class="caption-window" aria-label="Current subtitles">
          <div class="caption-line current">
            <div id="current-source" class="caption-source" dir="auto"></div>
            <div id="current-translation" class="caption-translation" dir="auto"></div>
          </div>
        </section>

        <div class="chrome-bar">
          <section class="status-line" aria-live="polite">
            <div class="status-controls">
              <label class="status-field status-field-service">
                <span>URL</span>
                <input id="server-url" value="ws://127.0.0.1:8000/ws/asr" spellcheck="false" />
              </label>
              <div class="language-settings" role="group" aria-label="Language settings">
                <label class="language-control">
                  <span>Speech</span>
                  <select id="language"></select>
                </label>
                <label class="language-control">
                  <span>Translate</span>
                  <select id="translation-target-language"></select>
                </label>
              </div>
              <label class="status-field status-field-source">
                <span>Audio</span>
                <select id="audio-source"></select>
              </label>
            </div>
            <div class="status-indicators">
              <span id="session-status"></span>
            </div>
          </section>

          <div class="caption-controls" role="group" aria-label="Session controls">
            <span id="volume-indicator" class="volume-indicator" aria-hidden="true" data-level="silent">
              <span class="volume-bar"></span>
              <span class="volume-bar"></span>
              <span class="volume-bar"></span>
            </span>
            <button
              id="transport-button"
              class="icon-button transport-control"
              type="button"
              aria-label="Start"
              title="Start"
            ></button>
            <button
              id="stop-button"
              class="icon-button stop-control"
              type="button"
              aria-label="Stop"
              title="Stop"
              disabled
            ></button>
            <button
              id="settings-button"
              class="icon-button settings-control"
              type="button"
              aria-label="Settings"
              title="Settings"
              aria-expanded="false"
              aria-controls="settings-panel"
            ></button>
            <button
              id="minimize-button"
              class="icon-button minimize-control"
              type="button"
              aria-label="Minimize"
              title="Minimize"
            ></button>
            <button
              id="close-button"
              class="icon-button close-control"
              type="button"
              aria-label="Close"
              title="Close"
            ></button>
          </div>
        </div>

        <section id="settings-panel" class="settings-panel" data-open="false" role="group" aria-label="Caption settings">
          <label class="settings-row settings-row-opacity">
            <span>Opacity</span>
            <span class="opacity-control">
              <output id="caption-opacity-value" class="opacity-value" for="caption-opacity" aria-hidden="true"></output>
              <input id="caption-opacity" type="range" min="0" max="100" step="1" />
            </span>
          </label>
          <div class="settings-row">
            <span>Background</span>
            <div class="settings-actions">
              <button id="background-button" class="settings-action" type="button">Choose…</button>
              <button id="background-clear-button" class="settings-action" type="button">Clear</button>
            </div>
          </div>
          <button id="export-button" class="settings-action settings-export" type="button">Copy transcript</button>
          <p id="settings-status" class="settings-status" aria-live="polite"></p>
          <input id="background-file" type="file" accept="image/*" hidden />
          <input id="offline-file" type="file" accept="audio/*,video/*" hidden />
        </section>
      </section>

      <div id="resize-north" class="resize-handle resize-north" data-resize-direction="North" aria-hidden="true"></div>
      <div id="resize-east" class="resize-handle resize-east" data-resize-direction="East" aria-hidden="true"></div>
      <div id="resize-south" class="resize-handle resize-south" data-resize-direction="South" aria-hidden="true"></div>
      <div id="resize-west" class="resize-handle resize-west" data-resize-direction="West" aria-hidden="true"></div>
      <div id="resize-north-east" class="resize-handle resize-corner resize-north-east" data-resize-direction="NorthEast" aria-hidden="true"></div>
      <div id="resize-north-west" class="resize-handle resize-corner resize-north-west" data-resize-direction="NorthWest" aria-hidden="true"></div>
      <div id="resize-south-east" class="resize-handle resize-corner resize-south-east" data-resize-direction="SouthEast" aria-hidden="true"></div>
      <div id="resize-south-west" class="resize-handle resize-corner resize-south-west" data-resize-direction="SouthWest" aria-hidden="true"></div>
    </main>

    <script type="module" src="./dist/app.js"></script>
  </body>
</html>
